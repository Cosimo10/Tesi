<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <title th:utext="${title}" /></title>
        <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}"/>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    </head>
    <body>
       <H1>Assessment Plan   <a th:utext="${assessmentPlan.name}">...</a>:</H1>
         
         <div>
         	<table class="table">
                <tr>
                    <td>Name</td>
                    <td>:</td>
                    <td><input type="text" th:field="*{assessmentPlan.name}" /></td>              
                </tr>
                
            </table>
            <table class="table">
            	
                <tr>
                    <th>Control</th>
                    <th>Description</th>
                    <th>State</th>
                </tr>
                <tr th:each ="assessmentcontrol : ${assessmentControls}">
                    <td><a th:utext="${assessmentcontrol.control.name}">...</a></td>
                    <td><a th:utext="${assessmentcontrol.control.description}">...</a></td>
                    <td><a th:utext="${assessmentcontrol.stato}">...</a></td>
                   
                </tr>
            </table>   
                     
        </div>
      
    </body>
</html>
